{% extends "base.html" %}
{% import "macros.html" as macros %}

{% block title %}Blog — {{ config.title }}{% endblock %}

{% block content %}

<div class="grid">
  <div class="section-header">
    <h1 class="section-header__title">All Posts</h1>
    <div class="section-header__line"></div>
  </div>

  {% for page in paginator.pages %}
    {{ macros::post_card(page=page) }}
  {% endfor %}

  {{ macros::pagination_nav(paginator=paginator) }}
</div>

{% endblock %}
