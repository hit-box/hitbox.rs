{% extends "base.html" %}

{% block title %}Tags — {{ config.title }}{% endblock %}

{% block content %}

<div class="grid">
  <div class="section-header">
    <h1 class="section-header__title">Tags</h1>
    <div class="section-header__line"></div>
  </div>

  <div class="tags-list">
    {% for term in terms %}
    <a href="{{ term.permalink }}" class="tag">{{ term.name }} ({{ term.pages | length }})</a>
    {% endfor %}
  </div>
</div>

{% endblock %}
